services:
    - type: web
      name: dota-stats
      env: node
      region: oregon
      rootDir: backend
      buildCommand: npm install && npm run build
      startCommand: npm start
      envVars:
          - key: NODE_ENV
            value: production
          - key: PORT
            value: 5000
          - key: BACKEND_URL
            value: https://dota-stats.onrender.com
          - key: FRONTEND_URL
            value: https://dota-statsnavy.vercel.app
          - key: JWT_SECRET
            generateValue: true
          - key: STEAM_API_KEY
            sync: false
          - key: STEAM_RETURN_URL
            value: https://dota-stats.onrender.com/api/auth/steam/return
