services:
    - type: web
      name: dota-stats-backend
      env: node
      buildCommand: npm install && npm run build
      startCommand: npm start
      envVars:
          - key: NODE_ENV
            value: production
          - key: PORT
            value: 5000
          - key: BACKEND_URL
            fromService:
                name: dota-stats-backend
                type: web
                property: host
          - key: FRONTEND_URL
            value: https://your-frontend.vercel.app
          - key: JWT_SECRET
            generateValue: true
          - key: STEAM_API_KEY
            sync: false
